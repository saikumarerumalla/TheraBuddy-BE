apiVersion: v1
kind: ConfigMap
metadata:
  name: therabuddy-config
data:
  APP_NAME: "AI Therapy Platform"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  ENVIRONMENT: "production"
  API_V1_PREFIX: "/api/v1"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "40"
  REDIS_MAX_CONNECTIONS: "50"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4-turbo-preview"
  LLM_TEMPERATURE: "0.7"
  LLM_MAX_TOKENS: "1000"
  LLM_TIMEOUT: "30"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"
  CRISIS_KEYWORDS_JA: '["自殺", "死にたい", "消えたい", "終わりにしたい", "生きる価値がない", "死ぬ", "自傷"]'
  CRISIS_KEYWORDS_EN: '["suicide", "kill myself", "end my life", "want to die", "no reason to live", "harm myself", "self-harm"]'
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: '["*"]'
  MAX_UPLOAD_SIZE: "5242880"
