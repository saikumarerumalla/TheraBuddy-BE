apiVersion: apps/v1
kind: Deployment
metadata:
  name: therabuddy-api
  labels:
    app: therabuddy-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: therabuddy-api
  template:
    metadata:
      labels:
        app: therabuddy-api
    spec:
      containers:
      - name: therabuddy-api
        image: therabuddy-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: therabuddy-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: therabuddy-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: therabuddy-secrets
              key: secret-key
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: therabuddy-secrets
              key: encryption-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: therabuddy-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: therabuddy-secrets
              key: anthropic-api-key
        envFrom:
        - configMapRef:
            name: therabuddy-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
